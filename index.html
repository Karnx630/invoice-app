<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    
    <!-- Manifest for Installable App -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Invoice%20Generator%22,%22short_name%22:%22Invoicer%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#1a73e8%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1048/1048953.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #003366;
            --danger: #dc3545;
            --success: #28a745;
            --border: #000;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
        .setup-panel { max-width: 1000px; margin: 0 auto 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        #installBtn { 
            display: none; 
            background: #ff9800; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: 600; font-size: 11px; color: #555; text-transform: uppercase; }
        input { padding: 10px; border: 1px solid #ccd; border-radius: 6px; font-size: 14px; }
        
        .input-row { display: flex; gap: 10px; background: #f8fbff; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #e1e8f0; }
        
        /* Interactive Edit Table */
        .edit-table-container { overflow-x: auto; margin-bottom: 20px; border: 1px solid #eee; border-radius: 8px; }
        .edit-table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        .edit-table th { background: #f1f4f8; padding: 10px; text-align: left; color: #666; font-size: 11px; }
        .edit-table td { padding: 8px 10px; border-top: 1px solid #eee; }
        .edit-table input { padding: 4px 8px; width: 100%; box-sizing: border-box; border: 1px solid transparent; background: #f9f9f9; }
        .edit-table input:focus { border-color: var(--primary); background: white; outline: none; }

        .btn-add { background: var(--success); color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; }
        .btn-del { color: var(--danger); border: none; background: none; cursor: pointer; font-weight: bold; }

        .invoice-container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: white; 
            padding: 50px; 
            border: 1px solid #eee; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            position: relative; 
            min-height: 1000px;
        }
        
        .religious-header { text-align: center; font-weight: bold; margin-bottom: 25px; font-size: 22px; color: #d32f2f; letter-spacing: 1px; } 
        .estimate-label { display: none; position: absolute; top: 25px; right: 25px; font-size: 11px; font-weight: 800; color: #777; text-transform: uppercase; border: 1.5px solid #777; padding: 4px 10px; border-radius: 4px; }

        .out-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid var(--border); }
        .out-table th, .out-table td { border: 1px solid var(--border); padding: 8px; text-align: center; font-size: 14px; }
        .out-table th { background: var(--secondary); color: white; text-transform: uppercase; font-size: 11px; }

        .summary-container { margin-top: -1px; width: 100%; }
        .summary-row { display: flex; justify-content: flex-end; }
        .summary-cell { width: 180px; border: 1px solid var(--border); border-top: none; padding: 10px; text-align: right; font-size: 14px; }
        .grand-total { font-weight: bold; font-size: 18px; background: #f8f9fa; }

        .action-row { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; }
        .btn-preview { background: #5c6bc0; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; flex: 1; font-weight: bold; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; flex: 1; font-weight: bold; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 15px 25px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; }

        .footer-note { margin-top: 40px; font-size: 13px; color: #333; border-top: 1px dashed #ccc; padding-top: 15px; display: none; }

        @media print { 
            .setup-panel { display: none !important; } 
            .invoice-container { display: block !important; border: none; padding: 0; box-shadow: none; margin: 0; width: 100%; } 
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="setup-panel">
    <button id="installBtn">📲 INSTALL INVOICER APP</button>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0; color: var(--secondary);">Invoice Engine</h2>
        <span style="font-size: 12px; color: var(--success); font-weight: 600;">● Auto-saved Locally</span>
    </div>
    
    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
        <div class="input-group">
            <label>Type</label>
            <div style="display:flex; gap:10px; padding: 8px; border:1px solid #ccd; border-radius:6px; background:white;">
                <label style="display:flex; align-items:center; gap:5px; text-transform:none;"><input type="radio" name="docType" value="invoice" checked onchange="saveAll()"> Invoice</label>
                <label style="display:flex; align-items:center; gap:5px; text-transform:none;"><input type="radio" name="docType" value="estimate" onchange="saveAll()"> Estimate</label>
            </div>
        </div>
        <div class="input-group" style="flex: 2; min-width: 200px;">
            <label>Client Name</label>
            <input type="text" id="client" placeholder="Customer Name" oninput="saveAll()">
        </div>
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="invDate" oninput="saveAll()">
        </div>
    </div>

    <!-- ENTRY FORM -->
    <div class="input-row">
        <div class="input-group" style="flex: 3; min-width: 150px;">
            <label>Description</label><input type="text" id="t-desc" placeholder="e.g. Tough Glass">
        </div>
        <div class="input-group" style="width: 50px;">
            <label>Qty</label><input type="number" id="t-qty" value="1">
        </div>
        <div class="input-group" style="width: 60px;">
            <label>Len</label><input type="number" id="t-len" placeholder="0">
        </div>
        <div class="input-group" style="width: 60px;">
            <label>Wid</label><input type="number" id="t-wid" placeholder="0">
        </div>
        <div class="input-group" style="width: 90px;">
            <label>Rate</label><input type="number" id="t-rate" placeholder="0">
        </div>
        <button class="btn-add" onclick="addItem()">Add Item</button>
    </div>

    <!-- EDITABLE LIST -->
    <div class="edit-table-container">
        <table class="edit-table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th style="width:50px">Qty</th>
                    <th style="width:60px">Len</th>
                    <th style="width:60px">Wid</th>
                    <th style="width:80px">Rate</th>
                    <th style="width:40px"></th>
                </tr>
            </thead>
            <tbody id="editBody"></tbody>
        </table>
    </div>

    <div style="display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap;">
        <div class="input-group" style="width: 180px;">
            <label>Shipping Charge</label>
            <input type="number" id="shippingCharge" placeholder="0" oninput="saveAll()">
        </div>
        <div class="input-group" style="flex: 1; min-width: 250px;">
            <label>Note / Special Instruction</label>
            <input type="text" id="footerNoteInput" placeholder="Keep this empty to hide in invoice" oninput="saveAll()">
        </div>
    </div>

    <div class="action-row">
        <button class="btn-preview" onclick="previewInvoice()">Show Preview</button>
        <button class="btn-print" onclick="printInvoice()">Print PDF</button>
        <button class="btn-clear" onclick="confirmClear()">Clear All</button>
    </div>
</div>

<div id="invoice" class="invoice-container">
    <div id="estimateFlag" class="estimate-label">Estimate</div>
    <div class="religious-header">।। श्री गणेशाय नम ।।</div>
    
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px;">
        <div>
            <div style="font-size: 11px; font-weight: bold; color: #666;">BILLED TO:</div>
            <div id="outClient" style="font-size: 18px; font-weight: bold;"></div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 11px; font-weight: bold; color: #666;">DATE:</div>
            <div id="outDate" style="font-size: 16px;"></div>
        </div>
    </div>

    <table class="out-table">
        <thead>
            <tr>
                <th style="width: 30px;">Sr.</th>
                <th style="text-align: left;">Description</th>
                <th style="width: 40px;">Qty</th>
                <th style="width: 45px;">Len</th>
                <th style="width: 45px;">Wid</th>
                <th style="width: 80px;">S.F/R.F</th>
                <th style="width: 70px;">Rate</th>
                <th style="width: 100px;">Total (₹)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="summary-container">
        <div class="summary-row">
            <div class="summary-cell" style="border-right: none; color: #555;">Subtotal</div>
            <div class="summary-cell" id="outSubtotal">0.00</div>
        </div>
        <div id="shippingRow" class="summary-row" style="display: none;">
            <div class="summary-cell" style="border-right: none; color: #555;">Shipping Charge</div>
            <div class="summary-cell" id="outShipping">0.00</div>
        </div>
        <div class="summary-row">
            <div class="summary-cell grand-total" style="border-right: none;">GRAND TOTAL</div>
            <div class="summary-cell grand-total" style="color: var(--secondary);">₹ <span id="outTotal">0.00</span></div>
        </div>
    </div>

    <div id="noteBox" class="footer-note">
        <strong>Note:</strong> <span id="noteContent"></span>
    </div>
</div>

<script>
    // PWA Service Worker Logic
    let deferredPrompt;
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const CACHE_NAME = 'invoice-v4';
                self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))); });
                self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))))); });
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e => console.log(e));
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    });

    let items = [];

    window.onload = () => {
        const saved = localStorage.getItem('inv_data_v4');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('client').value = data.client || '';
            document.getElementById('invDate').value = data.date || '';
            document.getElementById('footerNoteInput').value = data.note || '';
            document.getElementById('shippingCharge').value = data.shipping || '';
            items = data.items || [];
            if (data.docType) {
                const rb = document.querySelector(`input[value="${data.docType}"]`);
                if(rb) rb.checked = true;
            }
            renderEditList();
        } else {
            document.getElementById('invDate').valueAsDate = new Date();
        }
    };

    function saveAll() {
        const data = {
            client: document.getElementById('client').value,
            date: document.getElementById('invDate').value,
            note: document.getElementById('footerNoteInput').value,
            shipping: document.getElementById('shippingCharge').value,
            docType: document.querySelector('input[name="docType"]:checked').value,
            items: items
        };
        localStorage.setItem('inv_data_v4', JSON.stringify(data));
    }

    function addItem() {
        const desc = document.getElementById('t-desc').value;
        const qty = parseFloat(document.getElementById('t-qty').value) || 0;
        const len = parseFloat(document.getElementById('t-len').value) || 0;
        const wid = parseFloat(document.getElementById('t-wid').value) || 0;
        const rate = parseFloat(document.getElementById('t-rate').value) || 0;
        if(!desc) return;
        items.push({ desc, qty, len, wid, rate });
        renderEditList();
        saveAll();
        // Clear inputs
        document.getElementById('t-desc').value = '';
        document.getElementById('t-qty').value = '1';
        document.getElementById('t-len').value = '';
        document.getElementById('t-wid').value = '';
        document.getElementById('t-rate').value = '';
        document.getElementById('t-desc').focus();
    }

    function updateItemField(index, field, value) {
        items[index][field] = field === 'desc' ? value : (parseFloat(value) || 0);
        saveAll();
    }

    function renderEditList() {
        const tbody = document.getElementById('editBody');
        tbody.innerHTML = '';
        if(items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:#999">No items added yet</td></tr>';
            return;
        }
        items.forEach((item, i) => {
            tbody.innerHTML += `
                <tr>
                    <td><input type="text" value="${item.desc}" oninput="updateItemField(${i}, 'desc', this.value)"></td>
                    <td><input type="number" value="${item.qty}" oninput="updateItemField(${i}, 'qty', this.value)"></td>
                    <td><input type="number" value="${item.len}" oninput="updateItemField(${i}, 'len', this.value)"></td>
                    <td><input type="number" value="${item.wid}" oninput="updateItemField(${i}, 'wid', this.value)"></td>
                    <td><input type="number" value="${item.rate}" oninput="updateItemField(${i}, 'rate', this.value)"></td>
                    <td><button class="btn-del" onclick="items.splice(${i},1);renderEditList();saveAll();">✕</button></td>
                </tr>
            `;
        });
    }

    function generate() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let subtotal = 0;
        
        items.forEach((item, i) => {
            const q = item.qty || 1;
            let meas = 0;
            let unit = "Sf";
            if(item.len > 0 && item.wid > 0) meas = item.len * item.wid * q;
            else if(item.len > 0) { meas = item.len * q; unit = "Rf"; }
            else { meas = q; unit = "Qty"; }
            
            const amt = meas * item.rate;
            subtotal += amt;
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td style="text-align:left;">${item.desc}</td>
                <td>${item.qty || '-'}</td>
                <td>${item.len || '-'}</td>
                <td>${item.wid || '-'}</td>
                <td>${meas.toFixed(2)} ${unit}</td>
                <td>${item.rate}</td>
                <td>${amt.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
            </tr>`;
        });

        const shipInput = document.getElementById('shippingCharge').value;
        const shipVal = parseFloat(shipInput) || 0;
        const shipRow = document.getElementById('shippingRow');
        if(shipInput !== "" && shipVal > 0) {
            shipRow.style.display = 'flex';
            document.getElementById('outShipping').innerText = shipVal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        } else {
            shipRow.style.display = 'none';
        }

        const noteInput = document.getElementById('footerNoteInput').value;
        const noteBox = document.getElementById('noteBox');
        if(noteInput.trim() !== "") {
            noteBox.style.display = 'block';
            document.getElementById('noteContent').innerText = noteInput;
        } else {
            noteBox.style.display = 'none';
        }

        document.getElementById('outSubtotal').innerText = subtotal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('outTotal').innerText = (subtotal + shipVal).toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('outClient').innerText = document.getElementById('client').value || "Guest Customer";
        const d = document.getElementById('invDate').value;
        document.getElementById('outDate').innerText = d ? new Date(d).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}) : "-";

        const isEstimate = document.querySelector('input[name="docType"]:checked').value === 'estimate';
        document.getElementById('estimateFlag').style.display = isEstimate ? 'block' : 'none';
    }

    function previewInvoice() { generate(); document.getElementById('invoice').style.display = 'block'; window.scrollTo(0, document.body.scrollHeight); }
    function printInvoice() { generate(); document.getElementById('invoice').style.display = 'block'; setTimeout(()=>window.print(), 300); }
    function confirmClear() { if(confirm("Start a new invoice? This clears all items.")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
