<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoicer Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="./manifest.json">

    <style>
        :root { --primary: #1a73e8; --secondary: #003366; --danger: #dc3545; --success: #28a745; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; color: #333; }
        
        /* UI Panels */
        .setup-panel, .history-panel { max-width: 900px; margin: 0 auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        label { font-weight: 800; font-size: 10px; color: #666; text-transform: uppercase; }
        input { padding: 12px; border: 1px solid #ccd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 8px; background: #f8fbff; padding: 15px; border-radius: 8px; align-items: end; margin-bottom: 15px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--success); color: white; width: 100%; }
        .btn-print { background: var(--primary); color: white; flex: 1; font-size: 16px; }
        .btn-clear { background: var(--danger); color: white; }
        .btn-edit { background: var(--warning); color: #000; padding: 6px 12px; font-size: 12px; }

        /* Invoice Output (Hidden until Preview/Print) */
        #invoice { max-width: 800px; margin: 20px auto; background: white; padding: 40px; display: none; color: #000; border: 1px solid #eee; }
        .religious-header { text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 20px; color: #d32f2f; }
        
        /* Table Styling - Forced for Print */
        .out-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .out-table th { background-color: #003366 !important; color: white !important; padding: 12px 8px; text-transform: uppercase; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .out-table td { border: 1px solid #000; padding: 10px; text-align: center; font-weight: 500; }
        .desc-cell { text-align: left !important; font-weight: bold !important; font-size: 15px; }

        .summary-wrapper { display: flex; flex-direction: column; align-items: flex-end; margin-top: -2px; }
        .summary-box { display: flex; width: 300px; border: 2px solid #000; border-top: none; }
        .summary-label { flex: 1; padding: 10px; font-weight: bold; border-right: 1px solid #000; text-align: right; }
        .summary-val { width: 120px; padding: 10px; font-weight: bold; text-align: right; }

        /* History List */
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .history-row { cursor: pointer; transition: background 0.2s; }
        .history-row:hover { background: #f8fbff; }
        
        .btn-del-history { background: transparent; border: none; font-size: 16px; cursor: pointer; padding: 5px; border-radius: 4px; transition: 0.2s; }
        .btn-del-history:hover { background: #fee; }

        @media print {
            body { background: white; padding: 0; }
            .setup-panel, .history-panel, .action-bar, .btn-clear { display: none !important; }
            #invoice { display: block !important; border: none; padding: 0; margin: 0; width: 100%; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="setup-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin:0; color: var(--secondary);">Invoice Pro</h2>
        <div style="background:#f0f2f5; padding:8px 15px; border-radius:20px; display:flex; gap:15px;">
            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;"><input type="radio" name="docType" value="invoice" checked onchange="handleModeChange()"> Invoice</label>
            <label style="display:flex; align-items:center; gap:5px; cursor:pointer;"><input type="radio" name="docType" value="estimate" onchange="handleModeChange()"> Estimate</label>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px;">
        <div class="input-group"><label id="numLabel">Invoice No.</label><input type="text" id="docNo"></div>
        <div class="input-group"><label>Client Name</label><input type="text" id="client" placeholder="Customer Name"></div>
        <div class="input-group"><label>Date</label><input type="date" id="invDate"></div>
    </div>

    <div class="input-row">
        <div class="input-group"><label>Description</label><input type="text" id="t-desc"></div>
        <div class="input-group"><label>Qty</label><input type="number" id="t-qty" value="1"></div>
        <div class="input-group"><label>Len</label><input type="number" id="t-len"></div>
        <div class="input-group"><label>Wid</label><input type="number" id="t-wid"></div>
        <div class="input-group"><label>Rate</label><input type="number" id="t-rate"></div>
        <button class="btn btn-add" onclick="addItem()">ADD</button>
    </div>

    <div id="itemListUI" style="margin-bottom: 15px;"></div>

    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top:10px;">
        <div class="input-group"><label>Shipping</label><input type="number" id="shipping" value="0"></div>
        <div class="input-group"><label>Special Note</label><input type="text" id="note" placeholder="Optional"></div>
    </div>

    <div class="action-bar" style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn btn-print" style="background:#666" onclick="showInvoice(false)">Preview</button>
        <button class="btn btn-print" onclick="showInvoice(true)">Print & Save</button>
        <button class="btn btn-clear" onclick="resetForm()">New Bill</button>
    </div>
</div>

<div class="history-panel">
    <label style="margin-bottom: 10px; display:block;">Recent History (Click to load)</label>
    <table class="history-table">
        <tbody id="historyBody"></tbody>
    </table>
</div>

<div id="invoice">
    <div class="religious-header">।। श्री गणेशाय नम ।।</div>
    <div style="display: flex; justify-content: space-between; border-bottom: 3px solid #003366; padding-bottom: 10px; margin-bottom: 20px;">
        <div><label>Billed To:</label><div id="outClient" style="font-size: 20px; font-weight: bold;"></div></div>
        <div style="text-align: right;">
            <div style="font-size: 12px; font-weight: bold;" id="outDocLabel">INVOICE NO:</div>
            <div id="outDocNo" style="font-size: 18px; font-weight: bold;"></div>
            <div style="margin-top:5px; font-size: 12px;">DATE: <span id="outDate" style="font-weight: bold;"></span></div>
        </div>
    </div>

    <table class="out-table">
        <thead>
            <tr>
                <th style="width:30px">Sr.</th>
                <th style="text-align:left">Description</th>
                <th>Qty</th>
                <th>Len</th>
                <th>Wid</th>
                <th>S.F/R.F</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="outBody"></tbody>
    </table>

    <div class="summary-wrapper">
        <div class="summary-box"><div class="summary-label">Subtotal</div><div class="summary-val" id="outSub"></div></div>
        <div class="summary-box" style="background: #eee;"><div class="summary-label">GRAND TOTAL</div><div class="summary-val" id="outGrand"></div></div>
    </div>
    <div id="outNote" style="margin-top:30px; font-style: italic; font-size: 13px;"></div>
</div>

<script>
    let items = [];
    let history = JSON.parse(localStorage.getItem('inv_history') || '[]');
    let hasPrinted = false;

    window.onload = () => {
        document.getElementById('invDate').valueAsDate = new Date();
        handleModeChange();
        renderHistory();
    };

    function handleModeChange() {
        const type = document.querySelector('input[name="docType"]:checked').value;
        const countKey = type === 'invoice' ? 'count_inv' : 'count_est';
        document.getElementById('numLabel').innerText = type === 'invoice' ? "Invoice No." : "Estimate No.";
        document.getElementById('docNo').value = localStorage.getItem(countKey) || '1001';
    }

    function addItem() {
        const desc = document.getElementById('t-desc').value;
        if(!desc) return;
        
        items.push({
            desc,
            qty: parseFloat(document.getElementById('t-qty').value) || 1,
            len: parseFloat(document.getElementById('t-len').value) || 0,
            wid: parseFloat(document.getElementById('t-wid').value) || 0,
            rate: parseFloat(document.getElementById('t-rate').value) || 0
        });
        
        document.getElementById('t-desc').value = '';
        document.getElementById('t-qty').value = '1';
        document.getElementById('t-len').value = '';
        document.getElementById('t-wid').value = '';
        document.getElementById('t-rate').value = '';
        
        renderItemList();
    }

    function editItem(i) {
        const it = items[i];
        document.getElementById('t-desc').value = it.desc;
        document.getElementById('t-qty').value = it.qty;
        document.getElementById('t-len').value = it.len || '';
        document.getElementById('t-wid').value = it.wid || '';
        document.getElementById('t-rate').value = it.rate || '';
        
        items.splice(i, 1);
        renderItemList();
    }

    function renderItemList() {
        const div = document.getElementById('itemListUI');
        div.innerHTML = items.map((it, i) => `
            <div style="display:flex; justify-content:space-between; align-items: center; padding:10px; border-bottom:1px solid #ddd; font-size:14px; background:#fff; margin-bottom:4px; border-radius:4px;">
                <div style="flex:1;">
                    <b>${it.desc}</b><br>
                    <span style="font-size: 12px; color: #555;">Qty: ${it.qty} | Len: ${it.len||'-'} | Wid: ${it.wid||'-'} | Rate: ₹${it.rate}</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-edit" onclick="editItem(${i})">Edit</button>
                    <span style="color:red; cursor:pointer; font-weight:bold; font-size:16px; padding: 4px;" onclick="items.splice(${i},1);renderItemList()">✕</span>
                </div>
            </div>
        `).join('');
    }

    function showInvoice(doPrint) {
        const type = document.querySelector('input[name="docType"]:checked').value;
        document.getElementById('outDocLabel').innerText = type.toUpperCase() + " NO:";
        document.getElementById('outDocNo').innerText = "#" + document.getElementById('docNo').value;
        document.getElementById('outClient').innerText = document.getElementById('client').value || "Guest";
        document.getElementById('outDate').innerText = document.getElementById('invDate').value;
        
        let sub = 0;
        document.getElementById('outBody').innerHTML = items.map((it, i) => {
            let m = it.len > 0 && it.wid > 0 ? it.len * it.wid * it.qty : (it.len > 0 ? it.len * it.qty : it.qty);
            let total = m * it.rate;
            sub += total;
            return `<tr><td>${i+1}</td><td class="desc-cell">${it.desc}</td><td>${it.qty}</td><td>${it.len||'-'}</td><td>${it.wid||'-'}</td><td>${m.toFixed(2)}</td><td>${it.rate}</td><td>${total.toFixed(2)}</td></tr>`;
        }).join('');

        const ship = parseFloat(document.getElementById('shipping').value) || 0;
        document.getElementById('outSub').innerText = "₹" + sub.toFixed(2);
        document.getElementById('outGrand').innerText = "₹" + (sub + ship).toFixed(2);
        document.getElementById('outNote').innerText = document.getElementById('note').value ? "Note: " + document.getElementById('note').value : "";
        
        document.getElementById('invoice').style.display = 'block';

        if(doPrint) {
            hasPrinted = true;
            const currentNo = document.getElementById('docNo').value;
            
            const newHistoryItem = { 
                no: currentNo, 
                client: document.getElementById('client').value, 
                total: (sub+ship).toFixed(2),
                type: type,
                date: document.getElementById('invDate').value,
                items: JSON.parse(JSON.stringify(items)),
                shipping: document.getElementById('shipping').value,
                note: document.getElementById('note').value
            };

            const existingIndex = history.findIndex(h => h.no === currentNo && h.type === type);
            if(existingIndex > -1) {
                history[existingIndex] = newHistoryItem;
            } else {
                history.push(newHistoryItem);
            }
            
            localStorage.setItem('inv_history', JSON.stringify(history));
            renderHistory();
            setTimeout(() => window.print(), 300);
        }
    }

    function renderHistory() {
        const b = document.getElementById('historyBody');
        let html = '';
        for(let i = history.length - 1; i >= 0; i--) {
            const h = history[i];
            html += `
                <tr class="history-row" onclick="loadHistory(${i})">
                    <td><b>${h.type.toUpperCase()} #${h.no}</b></td>
                    <td>${h.client || 'Guest'}</td>
                    <td style="text-align:right">₹${h.total}</td>
                    <td style="text-align:center; width:30px;">
                        <button class="btn-del-history" onclick="deleteHistory(${i}, event)" title="Delete Record">🗑️</button>
                    </td>
                </tr>
            `;
        }
        b.innerHTML = html;
    }

    function loadHistory(index) {
        const h = history[index];
        if(!h) return;

        document.querySelector(`input[name="docType"][value="${h.type}"]`).checked = true;
        document.getElementById('numLabel').innerText = h.type === 'invoice' ? "Invoice No." : "Estimate No.";
        document.getElementById('docNo').value = h.no;
        document.getElementById('client').value = h.client || '';
        document.getElementById('invDate').value = h.date || new Date().toISOString().split('T')[0];
        document.getElementById('shipping').value = h.shipping || 0;
        document.getElementById('note').value = h.note || '';

        items = h.items ? JSON.parse(JSON.stringify(h.items)) : [];
        renderItemList();
        
        document.getElementById('invoice').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteHistory(index, event) {
        event.stopPropagation(); // Prevents loadHistory from triggering
        if(!confirm("Are you sure you want to delete this record from history?")) return;
        
        history.splice(index, 1);
        localStorage.setItem('inv_history', JSON.stringify(history));
        renderHistory();
    }

    function resetForm() {
        if(!confirm("Clear everything and start new?")) return;
        if(hasPrinted) {
            const type = document.querySelector('input[name="docType"]:checked').value;
            const countKey = type === 'invoice' ? 'count_inv' : 'count_est';
            localStorage.setItem(countKey, parseInt(document.getElementById('docNo').value) + 1);
        }
        location.reload();
    }
</script>
</body>
</html>
